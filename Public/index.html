<!DOCTYPE html>
<html>
<head>
<title>Word Puzzle</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#6ec1c6,#4dabf7);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* LOGIN */
#auth{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

#auth input{
padding:10px;
margin:5px;
width:200px;
}


/* GAME CARD */
.game-container{
display:none;
width:350px;
height:600px;
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

/* TOP BAR */
.top-bar{
display:flex;
justify-content:flex-end;
}

.coins{
background:#222;
color:#ffd43b;
padding:6px 15px;
border-radius:20px;
font-weight:bold;
}

/* WORD AREA */

.circle-area{
position:relative;
height:320px;
}

.letter{
width:55px;
height:55px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
position:absolute;
cursor:pointer;
box-shadow:0 5px 10px rgba(0,0,0,0.3);
transition:0.2s;
}

.letter:hover{
transform:scale(1.2);
}

.selected{
background:#ffd43b;
}

canvas{
position:absolute;
left:0;
top:0;
}

.result{
text-align:center;
font-size:25px;
letter-spacing:4px;
}

.message{
text-align:center;
height:20px;
}

/* BUTTONS */

.controls{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;

}

button{
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
background:#4dabf7;
color:white;
}

.reveal-btn{
background:#ff922b;
}

.skip-btn{
background:#845ef7;
}

.skip-btn:disabled{
background:gray;
cursor:not-allowed;
}

#leaderboard{
    width:250px;
    margin:20px auto;
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.leaderboard-item{
    display:flex;
    justify-content:space-between;
    padding:5px;
    border-bottom:1px solid #eee;
}

#leaderboardBtn{
padding:8px 15px;
border:none;
border-radius:8px;
background:#ffb400;
color:white;
cursor:pointer;
font-weight:bold;
}

.modal{
display:none;
position:fixed;
z-index:1000;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.modal-content{
background:white;
width:350px;
margin:10% auto;
padding:20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.close{
float:right;
font-size:24px;
cursor:pointer;
}

.leaderboard-item{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #eee;
}

.win-animation{
    position:fixed;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    background:#28a745;
    color:white;
    font-size:24px;
    padding:20px 40px;
    border-radius:12px;
    font-weight:bold;
    z-index:1000;
    transition:0.4s;
}

.win-animation.show{
    transform:translate(-50%,-50%) scale(1);
}

#confettiCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:999;
}

</style>
</head>

<body>


<!-- LOGIN -->

<div id="auth">

<h2>Login / Signup</h2>

<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>

</div>





<!-- GAME -->

<div class="game-container">

<div class="top-bar">
🪙 <span id="coin-count">0</span>
</div>

<button id="leaderboardBtn" onclick="openLeaderboard()">🏆 Leaderboard</button>

<h3 style="text-align:center">Unscramble</h3>

<div class="circle-area" id="circleArea">
<canvas id="canvas"></canvas>
</div>

<div class="result" id="result">---</div>
<div class="message" id="message"></div>

<div class="controls">
<button onclick="resetWord()">Reset</button>
<button class="skip-btn" onclick="skipWord()">Skip (<span id="skip-count">3</span>)</button>
<button class="reveal-btn" onclick="revealAnswer()">
Reveal (<span id="reveal-info">5 Free</span>)
</button>
</div>

</div>


<div id="winAnimation" class="win-animation">
    🎉 Correct! +5 Coins 🎉
</div>

<canvas id="confettiCanvas"></canvas>

<div id="leaderboardModal" class="modal">

  <div class="modal-content">

    <span class="close" onclick="closeLeaderboard()">×</span>

    <h2>🏆 Top Players</h2>

    <div id="leaderboard"></div>

  </div>

</div>


<script>

let userId=null;
let coins=0;
let correctWord="";
let currentWord="";
let selected=[];
let selectedElements=[];
let skips = 3;
let freeReveals = 5;

const circleArea=document.getElementById('circleArea');
const canvas=document.getElementById('canvas');


canvas.width=320;
canvas.height=320;



/* LOGIN */

async function login(){

const username=document.getElementById('username').value;
const password=document.getElementById('password').value;

const res=await fetch('/api/login',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({username,password})
});

const data=await res.json();

if(data.success){

userId=data.userId;
coins=data.coins;

document.getElementById('coin-count').innerText=coins;

document.getElementById('auth').style.display="none";
document.querySelector('.game-container').style.display="block";
skips = 3;
document.getElementById("skip-count").innerText = skips;
document.querySelector(".skip-btn").disabled = false;
freeReveals = 5;
document.getElementById("reveal-info").innerText = "5 Free";

fetchNewWord();
loadLeaderboard();

}else{
alert("Invalid Login");
}

}


/* SIGNUP */

async function signup(){

const username=document.getElementById('username').value;
const password=document.getElementById('password').value;

await fetch('/api/signup',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({username,password})
});

alert("Signup successful. Now login.");

}


/* FETCH WORD */

async function fetchNewWord(){

const res=await fetch('/api/get-word');
const data=await res.json();

correctWord=data.original.toUpperCase();
setupGame(data.jumbled.toUpperCase());

}


/* CREATE LETTER CIRCLE */

function setupGame(word){

circleArea.innerHTML='<canvas id="canvas"></canvas>';

const newCanvas=document.getElementById('canvas');
newCanvas.width=320;
newCanvas.height=320;

window.ctx=newCanvas.getContext('2d');

selected=[];
selectedElements=[];
currentWord="";

document.getElementById('result').innerText="---";
document.getElementById('message').innerText="";

const rect=circleArea.getBoundingClientRect();

const centerX=rect.width/2;
const centerY=rect.height/2;
const radius=110;

[...word].forEach((letter,i)=>{

const angle=(i/word.length)*(2*Math.PI);

const x=centerX+radius*Math.cos(angle);
const y=centerY+radius*Math.sin(angle);

const div=document.createElement('div');

div.className='letter';
div.innerText=letter;

div.style.left=(x-25)+'px';
div.style.top=(y-25)+'px';

div.onclick=()=>selectLetter(div,x,y,letter);

circleArea.appendChild(div);

});

}


/* SELECT LETTER */

function selectLetter(el,x,y,letter){

if(selectedElements.includes(el)) return;

el.classList.add('selected');

selected.push({x,y});
selectedElements.push(el);

currentWord+=letter;

drawLines();

document.getElementById('result').innerText=currentWord;

checkAnswer();

}


/* DRAW CONNECTION */

function drawLines(){

ctx.clearRect(0,0,320,320);

if(selected.length<2) return;

ctx.beginPath();

ctx.moveTo(selected[0].x,selected[0].y);

for(let i=1;i<selected.length;i++){
ctx.lineTo(selected[i].x,selected[i].y);
}

ctx.strokeStyle="black";
ctx.lineWidth=4;
ctx.stroke();

}


/* CHECK ANSWER */

function checkAnswer(){

const msg=document.getElementById('message');

if(currentWord===correctWord){

coins+=5;

document.getElementById('coin-count').innerText=coins;

updateCoins();

showWinAnimation();

msg.innerText="Correct!";

loadLeaderboard();

setTimeout(fetchNewWord,1200);

}else if(currentWord.length>=correctWord.length){

msg.innerText="Wrong!";
setTimeout(resetWord,800);

}

}


/* RESET */

function resetWord(){

selected=[];
selectedElements=[];
currentWord="";

ctx.clearRect(0,0,320,320);

document.querySelectorAll('.letter')
.forEach(el=>el.classList.remove('selected'));

document.getElementById('result').innerText="---";
document.getElementById('message').innerText="";

}


/* REVEAL */

function revealAnswer(){

const msg = document.getElementById("message");

/* FREE REVEAL AVAILABLE */
if(freeReveals > 0){

freeReveals--;

document.getElementById("reveal-info").innerText =
freeReveals > 0 ? freeReveals + " Free" : "25 🪙";

document.getElementById("result").innerText = correctWord;

msg.innerText = "Free reveal used";

setTimeout(fetchNewWord,1500);

return;

}


/* PAID REVEAL */

if(coins < 25){

msg.innerText = "Not enough coins ❌";
return;

}

coins -= 25;

document.getElementById("coin-count").innerText = coins;

updateCoins();

document.getElementById("result").innerText = correctWord;

msg.innerText = "Answer revealed";

setTimeout(fetchNewWord,1500);

}


/* SAVE COINS */

function updateCoins(){

fetch('/api/update-coins',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({userId,coins})
});

}

function skipWord(){

if(skips <= 0){
document.getElementById("message").innerText = "No skips left!";
return;
}

skips--;

document.getElementById("skip-count").innerText = skips;

document.getElementById("message").innerText = "Word skipped";

if(skips === 0){
document.querySelector(".skip-btn").disabled = true;
}

setTimeout(fetchNewWord,800);

}

async function loadLeaderboard(){
    const res = await fetch("/api/leaderboard");
    const data = await res.json();

    const board = document.getElementById("leaderboard");
    board.innerHTML = "";

    data.forEach((player,index)=>{
        const div = document.createElement("div");
        div.className = "leaderboard-item";

        div.innerHTML = `
        <span>${index+1}. ${player.username}</span>
        <span>${player.coins} 🪙</span>
        `;

        board.appendChild(div);
    });
}
loadLeaderboard();

function openLeaderboard(){
    document.getElementById("leaderboardModal").style.display="block";
    loadLeaderboard();
}

function closeLeaderboard(){
    document.getElementById("leaderboardModal").style.display="none";
}



function showWinAnimation(){

    const box = document.getElementById("winAnimation");

    box.classList.add("show");

    startConfetti();

    setTimeout(()=>{
        box.classList.remove("show");
        stopConfetti();
    },2000);

}

const canvas = document.getElementById("confettiCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetti = [];
let animation;

function startConfetti(){

    confetti = [];

    for(let i=0;i<150;i++){
        confetti.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            r:Math.random()*6+2,
            d:Math.random()*10
        });
    }

    animation = requestAnimationFrame(drawConfetti);
}

function drawConfetti(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="gold";

    confetti.forEach(c=>{
        ctx.beginPath();
        ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
        ctx.fill();

        c.y += 2;
        if(c.y>canvas.height){
            c.y=0;
        }
    });

    animation=requestAnimationFrame(drawConfetti);
}

function stopConfetti(){
    cancelAnimationFrame(animation);
    ctx.clearRect(0,0,canvas.width,canvas.height);
}

</script>


</body>
</html>
